# fly.toml app configuration file generated for xpct-alerts on 2026-04-10T11:52:20-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xpct-alerts'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALERT_DAILY = '1'
  ALERT_TIME = '07:30'
  TZ = 'America/Mexico_City'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
